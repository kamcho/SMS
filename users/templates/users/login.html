{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Excel SMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        'primary-hover': '#4338ca',
                        'kenyan-black': '#000000',
                        'kenyan-red': '#BB0000',
                        'kenyan-green': '#006600',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full animate-in fade-in zoom-in duration-500">
        <!-- Logo/Header -->
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-xl mx-auto mb-6">E</div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Welcome Back</h1>
            <p class="text-slate-500 mt-2 font-medium">Sign in to manage Excel SMS</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/80 backdrop-blur-xl rounded-3xl border border-white shadow-2xl p-8 md:p-10">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                {% if form.errors %}
                    <div class="p-4 bg-rose-50 border border-rose-100 rounded-2xl flex items-center gap-3 text-rose-600 text-sm font-bold animate-pulse">
                        <i class="fas fa-exclamation-circle text-lg"></i>
                        Invalid email or password.
                    </div>
                {% endif %}

                <div>
                    <label for="id_username" class="block text-sm font-bold text-slate-700 mb-2 tracking-tight">Email Address</label>
                    <div class="relative group">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                        <input type="email" name="username" id="id_username" required 
                               class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-medium focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all placeholder:text-slate-400"
                               placeholder="name@school.com">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label for="id_password" class="text-sm font-bold text-slate-700 tracking-tight">Password</label>
                        <a href="#" class="text-xs font-bold text-indigo-600 hover:text-indigo-700">Forgot Password?</a>
                    </div>
                    <div class="relative group">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                        <input type="password" name="password" id="id_password" required 
                               class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-medium focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all placeholder:text-slate-400"
                               placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    Sign In
                    <i class="fas fa-arrow-right text-sm"></i>
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 flex items-center justify-center gap-4">
                <div class="h-1 w-full flex rounded-full overflow-hidden opacity-30">
                    <div class="bg-kenyan-black flex-grow"></div>
                    <div class="bg-kenyan-red flex-grow"></div>
                    <div class="bg-kenyan-green flex-grow"></div>
                </div>
            </div>
        </div>
        
        <p class="text-center mt-8 text-slate-500 text-sm font-medium">
            Authorized Personnel Only
        </p>
    </div>
</body>
</html>
